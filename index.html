  <script>
    (function () {
      // Avatar random color
      var colors = ['#95a785', '#f3c46d', '#d77245', '#eadfc6'];
      var avatar = document.getElementById('avatar');
      avatar.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

      // Card tilt effect
      var card = document.querySelector('.card');
      var maxTilt = 2;

      card.addEventListener('mousemove', function (e) {
        var rect = card.getBoundingClientRect();
        var x = (e.clientX - rect.left) / rect.width - 0.5;
        var y = (e.clientY - rect.top) / rect.height - 0.5;
        var rotateY = -x * maxTilt;
        var rotateX = y * maxTilt;
        card.style.transform = 'rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) translateZ(6px)';
        card.style.boxShadow = getComputedStyle(document.documentElement).getPropertyValue('--shadow-card-hover');
      });

      card.addEventListener('mouseleave', function () {
        card.style.transform = '';
        card.style.boxShadow = '';
      });

      // Theme toggle
      var toggle = document.querySelector('.theme-toggle');
      var buttons = toggle.querySelectorAll('button');
      var darkMQ = window.matchMedia('(prefers-color-scheme: dark)');

      function applyTheme(mode) {
        var root = document.documentElement;
        if (mode === 'system') {
          root.removeAttribute('data-theme');
        } else {
          root.setAttribute('data-theme', mode);
        }
        buttons.forEach(function (btn) {
          btn.classList.toggle('active', btn.dataset.themeValue === mode);
        });
      }

      buttons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          applyTheme(btn.dataset.themeValue);
        });
      });

      // Default to system
      applyTheme('system');

      // Tooltip edge-aware positioning
      function updateTipMax() {
        buttons.forEach(function (btn) {
          var space = window.innerWidth - btn.getBoundingClientRect().right;
          btn.style.setProperty('--tip-max', (space - 4) + 'px');
        });
      }
      updateTipMax();
      window.addEventListener('resize', updateTipMax);
    })();
  </script>
